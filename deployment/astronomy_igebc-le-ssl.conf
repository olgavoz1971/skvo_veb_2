<IfModule mod_ssl.c>
<VirtualHost *:443>

    ServerName astronomy.science.upjs.sk

    # =====================
    # WordPress (root /)
    # =====================
    DocumentRoot "/opt/astronomy"
    DirectoryIndex index.html index.php

    <Directory "/opt/astronomy">
        Require all granted
        AllowOverride All
    </Directory>

    RewriteEngine On

    # Gather messages from both portals:
    ErrorLog /var/www/flask/skvo_veb/log/error.log
    CustomLog /var/www/flask/skvo_veb/log/access.log combined

    # =====================
    # Plotly / WSGI (/igebc)
    # =====================
    ServerAdmin webmaster@skvo.science.upjs.sk

    WSGIDaemonProcess skvo_veb user=www-data group=www-data threads=5
    WSGIProcessGroup skvo_veb
    WSGIApplicationGroup %{GLOBAL}

    WSGIScriptAlias /igebc /var/www/flask/skvo_veb.wsgi

    <Directory /var/www/flask/skvo_veb>
        WSGIProcessGroup skvo_veb
        Require all granted
    </Directory>

    Alias /static/ /var/www/flask/skvo_veb/static
    <Directory /static>
        Require all granted
    </Directory>

    <Directory /var/www/flask/skvo_veb/log>
        Require all granted
    </Directory>

    WSGIScriptReloading On

    # =====================
    # SSL
    # =====================
    SSLCertificateFile /etc/letsencrypt/live/skvo.science.upjs.sk/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/skvo.science.upjs.sk/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

</VirtualHost>
</IfModule>
